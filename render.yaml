# Render Blueprint — GitHub repo ulanganda barcha servislar avtomatik yaratiladi.
# Dashboard: New > Blueprint > repo tanlang > render.yaml

databases:
  - name: optical-ai-db
    plan: free
    databaseName: optical_ai_monitoring
    user: optical_ai

services:
  # FastAPI backend (Docker)
  - type: web
    name: optical-ai-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: optical-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: optical-ai-web
          envVarKey: RENDER_EXTERNAL_URL

  # React frontend (static site)
  - type: web
    name: optical-ai-web
    runtime: static
    rootDir: frontend
    buildCommand: bash ./render-build.sh
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: RENDER_API_URL
        fromService:
          type: web
          name: optical-ai-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
