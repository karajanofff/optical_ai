services:
  db:
    image: postgres:16-alpine
    container_name: optical-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optical_ai_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-optical_ai_monitoring}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: optical-ai-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/optical_ai_monitoring}
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/api}
    container_name: optical-ai-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
